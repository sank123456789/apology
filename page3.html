<!DOCTYPE html>
<html>
<head>
    <title>Make It Right</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">
    <h2>What can I do to make it right?</h2>

    <input type="text" placeholder="Tell me what I should do..." id="inputBox">

    <button onclick="submit()">Submit</button>

    <p id="finalMessage"></p>
    <p id="finalMessage"></p>
</div>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@2/dist/email.min.js"></script>

<script>
(function(){
    emailjs.init("LDs3IMtUu9JSKOBuH"); // 🔑 put your public key here
})();

function submit(){
    let input = document.getElementById("inputBox").value;

    if(input.trim() === ""){
        document.getElementById("finalMessage").innerText =
        "Even if you don't know what to say... I still care about you.";
        return;
    }

    let params = {
        message: input
    };

    emailjs.send("service_eq4muye", "template_6ahqpuu", params)
    .then(function(){
        document.getElementById("finalMessage").innerText =
        "Thank you... I’ll do my best to make it right 💙";
    }, function(error){
        document.getElementById("finalMessage").innerText =
        "Something went wrong...";
        console.log(error);
    });
}
</script>

</body>
</html>
